# ─────────────────────────────────────────────
# Mosquitto MQTT Broker Configuration — SAMS
# ─────────────────────────────────────────────

listener 1883
protocol mqtt

# WebSocket listener for browser clients
listener 9001
protocol websockets

# Allow anonymous connections (dev mode)
# In production: use password_file + TLS
allow_anonymous true

# Logging
log_type error
log_type warning
log_type notice
log_type information
log_dest stdout

# Persistence
persistence true
persistence_location /mosquitto/data/

# Message limits
max_packet_size 65536
message_size_limit 0
